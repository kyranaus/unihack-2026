name: Deploy to Cloudflare Workers (Bun)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build PWA
        run: bun run build
        # Vinxi/TanStack Start outputs to .output/

      - name: Upload secrets to Cloudflare
        run: |
          jq -n \
            --arg a "$BETTER_AUTH_SECRET" \
            --arg b "$DATABASE_URL" \
            --arg c "$GOOGLE_CLIENT_ID" \
            --arg d "$GOOGLE_CLIENT_SECRET" \
            --arg e "$BETTER_AUTH_URL" \
            '{BETTER_AUTH_SECRET:$a,DATABASE_URL:$b,GOOGLE_CLIENT_ID:$c,GOOGLE_CLIENT_SECRET:$d,BETTER_AUTH_URL:$e}' \
            | bunx wrangler secret bulk --config .output/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
